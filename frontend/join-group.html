<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Join Group - GroupDrive</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
        }

        .animate-slide-up {
            animation: slideUp 0.6s ease-out;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>

<body class="bg-slate-50 min-h-screen flex flex-col selection:bg-blue-200">

    <header class="bg-white shadow-sm border-b border-gray-100">
        <div class="max-w-3xl mx-auto px-4 sm:px-6 lg:px-8 h-16 flex items-center justify-between">
            <a href="index.html" class="flex items-center gap-2 hover:opacity-80 transition-opacity">
                <span class="text-2xl">🚗</span>
                <h1 class="text-xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-blue-700 to-blue-500">
                    GroupDrive
                </h1>
            </a>
        </div>
    </header>

    <main class="flex-grow flex items-center justify-center p-4">
        <div
            class="w-full max-w-md bg-white rounded-2xl shadow-xl shadow-blue-900/5 border border-slate-100 p-8 animate-slide-up">

            <div class="mb-8 text-center">
                <h2 class="text-2xl font-bold text-slate-900 mb-2">Join a Trip</h2>
                <p class="text-slate-500 text-sm">Enter the group ID provided by your admin.</p>
            </div>

            <form id="joinGroupForm" class="space-y-5">

                <div class="space-y-1.5">
                    <label for="groupId" class="block text-sm font-medium text-slate-700">Group ID</label>
                    <input type="text" id="groupId" name="groupId" required placeholder="e.g. ABC123"
                        class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:border-blue-500 focus:ring-2 focus:ring-blue-200 outline-none transition-all placeholder:text-slate-400 font-mono uppercase">
                </div>

                <div class="space-y-1.5">
                    <label for="memberName" class="block text-sm font-medium text-slate-700">Your Name</label>
                    <input type="text" id="memberName" name="memberName" required placeholder="e.g. John Doe"
                        class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:border-blue-500 focus:ring-2 focus:ring-blue-200 outline-none transition-all placeholder:text-slate-400">
                </div>

                <button type="submit" id="submitBtn"
                    class="w-full mt-2 py-3.5 px-4 bg-slate-900 hover:bg-slate-800 text-white font-medium rounded-xl transition-all shadow-lg active:scale-[0.98] flex justify-center items-center gap-2">
                    <span>Join Trip</span>
                    <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M14 5l7 7m0 0l-7 7m7-7H3" />
                    </svg>
                </button>
            </form>

            <!-- Error State -->
            <div id="errorMsg"
                class="hidden mt-4 p-3 bg-red-50 text-red-600 text-sm rounded-lg text-center border border-red-100">
                Invalid Group ID. Please try again.
            </div>

        </div>
    </main>

    <script>
        const API_URL = 'http://localhost:8080/api/groups/join';

        // Pre-fill Group ID if in URL (e.g., from an invite link)
        const urlParams = new URLSearchParams(window.location.search);
        const urlGroupId = urlParams.get('groupId');
        if (urlGroupId) {
            document.getElementById('groupId').value = urlGroupId;
        }

        document.getElementById('joinGroupForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const btn = document.getElementById('submitBtn');
            const errorMsg = document.getElementById('errorMsg');
            btn.innerHTML = 'Joining...';
            btn.disabled = true;
            btn.classList.add('opacity-75');
            errorMsg.classList.add('hidden');

            const groupIdInput = document.getElementById('groupId').value.trim().toUpperCase();
            const memberName = document.getElementById('memberName').value.trim();

            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ groupId: groupIdInput, memberName })
                });

                if (!response.ok) {
                    const errorText = await response.text();
                    throw new Error(errorText || 'Failed to join group');
                }

                const data = await response.json();

                // Save session context
                sessionStorage.setItem('groupId', data.groupId);
                sessionStorage.setItem('memberId', data.memberId);
                sessionStorage.setItem('memberName', data.memberName);
                sessionStorage.setItem('role', data.role);

                // Redirect directly to map
                window.location.href = `map.html?groupId=${data.groupId}`;

            } catch (err) {
                console.error(err);
                errorMsg.textContent = err.message || 'Something went wrong. Please try again.';
                errorMsg.classList.remove('hidden');
            } finally {
                btn.innerHTML = 'Join Trip';
                btn.disabled = false;
                btn.classList.remove('opacity-75');
            }
        });
    </script>
</body>

</html>
