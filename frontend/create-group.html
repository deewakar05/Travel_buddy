<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Group - GroupDrive</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
        }

        .animate-slide-up {
            animation: slideUp 0.6s ease-out;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>

<body class="bg-slate-50 min-h-screen flex flex-col selection:bg-blue-200">

    <header class="bg-white shadow-sm border-b border-gray-100">
        <div class="max-w-3xl mx-auto px-4 sm:px-6 lg:px-8 h-16 flex items-center justify-between">
            <a href="index.html" class="flex items-center gap-2 hover:opacity-80 transition-opacity">
                <span class="text-2xl">🚗</span>
                <h1 class="text-xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-blue-700 to-blue-500">
                    GroupDrive
                </h1>
            </a>
        </div>
    </header>

    <main class="flex-grow flex items-center justify-center p-4">
        <div
            class="w-full max-w-md bg-white rounded-2xl shadow-xl shadow-blue-900/5 border border-slate-100 p-8 animate-slide-up">

            <div class="mb-8 text-center">
                <h2 class="text-2xl font-bold text-slate-900 mb-2">Create a New Trip</h2>
                <p class="text-slate-500 text-sm">Set up your group and invite friends to share locations.</p>
            </div>

            <form id="createGroupForm" class="space-y-5">

                <div class="space-y-1.5">
                    <label for="groupName" class="block text-sm font-medium text-slate-700">Trip Name</label>
                    <input type="text" id="groupName" name="groupName" required
                        placeholder="e.g., Weekend Getaway to Goa"
                        class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:border-blue-500 focus:ring-2 focus:ring-blue-200 outline-none transition-all placeholder:text-slate-400">
                </div>

                <div class="space-y-1.5">
                    <label for="adminName" class="block text-sm font-medium text-slate-700">Your Name</label>
                    <input type="text" id="adminName" name="adminName" required placeholder="You'll be the Admin"
                        class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:border-blue-500 focus:ring-2 focus:ring-blue-200 outline-none transition-all placeholder:text-slate-400">
                </div>

                <button type="submit" id="submitBtn"
                    class="w-full mt-2 py-3.5 px-4 bg-blue-600 hover:bg-blue-700 text-white font-medium rounded-xl transition-all shadow-lg shadow-blue-600/20 active:scale-[0.98] flex justify-center items-center gap-2">
                    <span>Create & Get Link</span>
                    <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M14 5l7 7m0 0l-7 7m7-7H3" />
                    </svg>
                </button>
            </form>

            <!-- Success State (Hidden by default) -->
            <div id="successState" class="hidden space-y-6 text-center mt-2">
                <div class="mx-auto flex items-center justify-center h-12 w-12 rounded-full bg-green-100">
                    <svg class="h-6 w-6 text-green-600" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7" />
                    </svg>
                </div>

                <div class="space-y-2">
                    <h3 class="text-lg font-bold text-slate-900">Trip Created!</h3>
                    <p class="text-sm text-slate-500">Share this group ID or link with your friends to join.</p>
                </div>

                <div
                    class="bg-slate-50 border border-slate-200 p-4 rounded-xl flex items-center justify-between gap-3 group">
                    <div class="flex flex-col text-left">
                        <span class="text-xs font-semibold text-slate-500 uppercase tracking-wider">Group ID</span>
                        <span id="groupIdDisplay"
                            class="text-xl font-mono font-bold text-slate-900 tracking-wider">ABC123</span>
                    </div>
                    <button onclick="copyLink()"
                        class="p-2.5 bg-white rounded-lg border border-slate-200 hover:border-blue-500 hover:text-blue-600 text-slate-500 transition-colors tooltip relative"
                        title="Copy Info">
                        <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z" />
                        </svg>
                    </button>
                </div>

                <a id="goToMapBtn" href="#"
                    class="inline-flex w-full py-3.5 px-4 bg-slate-900 hover:bg-slate-800 text-white font-medium rounded-xl transition-all shadow-lg active:scale-[0.98] justify-center text-center">
                    Go to Live Map
                </a>
            </div>

            <!-- Error State -->
            <div id="errorMsg"
                class="hidden mt-4 p-3 bg-red-50 text-red-600 text-sm rounded-lg text-center border border-red-100">
                Something went wrong. Please try again.
            </div>

        </div>
    </main>

    <script>
        const API_URL = 'http://localhost:8080/api/groups/create';

        document.getElementById('createGroupForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const btn = document.getElementById('submitBtn');
            const errorMsg = document.getElementById('errorMsg');
            btn.innerHTML = 'Creating...';
            btn.disabled = true;
            btn.classList.add('opacity-75');
            errorMsg.classList.add('hidden');

            const groupName = document.getElementById('groupName').value;
            const adminName = document.getElementById('adminName').value;

            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ groupName, adminName })
                });

                if (!response.ok) throw new Error('Failed to create group');

                const data = await response.json();

                // Save session context
                sessionStorage.setItem('groupId', data.groupId);
                sessionStorage.setItem('memberId', data.adminId);
                sessionStorage.setItem('memberName', data.adminName);
                sessionStorage.setItem('memberToken', data.memberToken);
                sessionStorage.setItem('role', 'ADMIN');

                // Show success UI
                document.getElementById('createGroupForm').classList.add('hidden');
                document.getElementById('successState').classList.remove('hidden');
                document.getElementById('groupIdDisplay').textContent = data.groupId;
                document.getElementById('goToMapBtn').href = `map.html?groupId=${data.groupId}`;

            } catch (err) {
                console.error(err);
                errorMsg.classList.remove('hidden');
            } finally {
                btn.innerHTML = 'Create & Get Link';
                btn.disabled = false;
                btn.classList.remove('opacity-75');
            }
        });

        function copyLink() {
            const groupId = document.getElementById('groupIdDisplay').textContent;
            navigator.clipboard.writeText(`Join my group on GroupDrive! ID: ${groupId}`);
            alert('Group details copied to clipboard!');
        }
    </script>
</body>

</html>
