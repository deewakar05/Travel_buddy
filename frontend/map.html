<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Live Map - GroupDrive</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
        integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />

    <style>
        body {
            font-family: 'Inter', sans-serif;
            overflow: hidden;
        }

        #map {
            height: 100%;
            width: 100%;
            z-index: 10;
        }

        /* Custom markers */
        .custom-marker {
            background-color: white;
            border: 2px solid #3b82f6;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            color: #1e3a8a;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        .self-marker {
            background-color: #3b82f6;
            border: 2px solid white !important;
            color: white !important;
        }

        /* Role specific colors */
        .marker-admin {
            border-color: #f59e0b !important;
            color: #78350f;
        }

        .marker-admin.self-marker {
            background-color: #f59e0b !important;
        }

        .marker-route-planner {
            border-color: #8b5cf6 !important;
            color: #4c1d95;
        }

        .marker-route-planner.self-marker {
            background-color: #8b5cf6 !important;
        }

        .marker-member {
            border-color: #3b82f6 !important;
            color: #1e3a8a;
        }

        .marker-member.self-marker {
            background-color: #3b82f6 !important;
        }

        /* Panels and UI */
        .bottom-panel {
            box-shadow: 0 -4px 20px rgba(0, 0, 0, 0.1);
            transition: transform 0.3s ease-in-out;
            z-index: 40;
        }

        #participantsPanel {
            transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 50;
        }

        #participantsPanel.hidden-panel {
            transform: translateX(100%);
        }

        .participant-row {
            transition: background-color 0.2s;
        }

        .participant-row:hover {
            background-color: #f8fafc;
        }
    </style>
</head>

<body class="bg-slate-50 h-screen w-screen flex flex-col selection:bg-blue-200 relative">

    <!-- Top Floating Header -->
    <header class="absolute top-0 left-0 right-0 z-40 p-4 pointer-events-none">
        <div class="max-w-md mx-auto flex items-center justify-between gap-4 pointer-events-auto">
            <div
                class="bg-white/90 backdrop-blur-md shadow-lg rounded-2xl px-4 py-3 flex-grow flex flex-col border border-white/20">
                <div class="flex items-center justify-between">
                    <div>
                        <h1 id="groupNameLabel" class="text-sm font-bold text-slate-900 leading-tight">Loading Trip...
                        </h1>
                        <p id="groupIdLabel" class="text-xs text-slate-500 font-mono">ID: ---</p>
                    </div>
                    <div class="flex flex-col items-end gap-1">
                        <span id="roleBadge"
                            class="px-2 py-1 bg-blue-100 text-blue-700 text-[10px] font-bold uppercase rounded-md tracking-wider">MEMBER</span>
                        <div
                            class="flex items-center gap-1.5 px-1.5 py-0.5 bg-slate-100 rounded-full border border-slate-200">
                            <span class="w-1.5 h-1.5 rounded-full bg-green-500 animate-pulse"></span>
                            <span id="memberCountLabel" class="text-[10px] font-bold text-slate-600">-- Members</span>
                        </div>
                    </div>
                </div>
            </div>

            <button onclick="copyGroupLink()"
                class="bg-blue-600 shadow-lg shadow-blue-600/30 text-white p-3 rounded-2xl hover:bg-blue-700 transition-colors flex items-center justify-center">
                <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M8.684 13.342C8.886 12.938 9 12.482 9 12c0-.482-.114-.938-.316-1.342m0 2.684a3 3 0 110-2.684m0 2.684l6.632 3.316m-6.632-6l6.632-3.316m0 0a3 3 0 105.367-2.684 3 3 0 00-5.367 2.684zm0 9.316a3 3 0 105.368 2.684 3 3 0 00-5.368-2.684z" />
                </svg>
            </button>
        </div>

        <div id="leaderHud"
            class="hidden max-w-md mx-auto mt-2 bg-slate-900/80 backdrop-blur text-white px-4 py-2 rounded-xl flex items-center justify-between text-sm pointer-events-auto">
            <div class="flex items-center gap-2">
                <span class="relative flex h-3 w-3">
                    <span
                        class="animate-ping absolute inline-flex h-full w-full rounded-full bg-amber-400 opacity-75"></span>
                    <span class="relative inline-flex rounded-full h-3 w-3 bg-amber-500"></span>
                </span>
                <span>Distance to Leader: <b id="leaderDistance">--</b></span>
            </div>
            <span id="leaderWarning" class="text-red-400 font-bold hidden">Falling behind!</span>
        </div>

        <div id="toastContainer" class="max-w-md mx-auto mt-2 space-y-2 flex flex-col items-center"></div>
    </header>

    <!-- Floating Participants Button -->
    <div class="fixed right-4 bottom-44 z-40">
        <button id="toggleParticipantsBtn"
            class="bg-white shadow-xl text-slate-700 p-4 rounded-full hover:bg-slate-50 transition-all flex items-center justify-center border border-slate-200 relative group">
            <svg class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z" />
            </svg>
            <span id="memberCountBadge"
                class="absolute -top-1 -right-1 bg-blue-600 text-white text-[10px] font-bold rounded-full w-5 h-5 flex items-center justify-center border-2 border-white hidden">0</span>
        </button>
    </div>

    <!-- Side Participants Panel -->
    <div id="participantsPanel"
        class="hidden-panel fixed top-0 right-0 h-full w-80 bg-white shadow-2xl flex flex-col z-50">
        <div class="p-6 border-b border-slate-100 flex items-center justify-between bg-slate-50/50">
            <div>
                <h2 class="text-lg font-bold text-slate-900">Trip Members</h2>
                <p class="text-xs text-slate-500">Live activity status</p>
            </div>
            <button id="closeParticipantsBtn"
                class="p-2 text-slate-400 hover:text-slate-600 transition-colors bg-white rounded-lg border border-slate-100 shadow-sm">
                <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
                </svg>
            </button>
        </div>
        <div id="detailedParticipantsList" class="flex-grow overflow-y-auto p-4 space-y-3">
            <div class="animate-pulse space-y-4">
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 bg-slate-100 rounded-full"></div>
                    <div class="flex-grow h-4 bg-slate-100 rounded w-1/2"></div>
                </div>
                <div class="flex-grow h-4 bg-slate-100 rounded w-2/3"></div>
            </div>
        </div>
    </div>

    <!-- The Map Container -->
    <main class="flex-grow w-full h-full relative z-10">
        <div id="map"></div>
    </main>

    <!-- Bottom Control Panel -->
    <footer class="bottom-panel absolute bottom-0 left-0 right-0 bg-white rounded-t-3xl border-t border-slate-200">
        <div class="max-w-md mx-auto p-5 space-y-4">
            <div class="flex items-center justify-between">
                <div>
                    <h3 class="font-bold text-slate-900" id="userNameLabel">My Status</h3>
                    <p class="text-xs text-slate-500" id="statusLabel">Waiting for GPS...</p>
                </div>
                <!-- Toggle Switch -->
                <button id="toggleSharingBtn"
                    class="relative inline-flex h-7 w-14 items-center rounded-full transition-colors focus:outline-none focus:ring-2 focus:ring-blue-500 bg-slate-300">
                    <span id="toggleKnob"
                        class="inline-block h-5 w-5 transform rounded-full bg-white transition-transform translate-x-1 shadow-sm"></span>
                </button>
            </div>

            <div class="flex gap-3 pt-2 border-t border-slate-100">
                <button id="recenterBtn"
                    class="flex-1 py-3 px-4 bg-slate-100 hover:bg-slate-200 text-slate-700 font-medium rounded-xl transition-colors text-sm flex items-center justify-center gap-2">
                    <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z" />
                    </svg>
                    My Location
                </button>
                <button id="exitGroupBtn"
                    class="py-3 px-4 bg-red-50 hover:bg-red-100 text-red-600 font-medium rounded-xl transition-colors text-sm flex items-center justify-center gap-2">
                    <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" />
                    </svg>
                    Exit
                </button>
            </div>
        </div>
    </footer>

    <!-- Scripts -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
        integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/sockjs-client/1.6.1/sockjs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/stomp.js/2.3.3/stomp.min.js"></script>

    <script src="js/map.js"></script>
    <script src="js/socket.js"></script>
    <script src="js/gps.js"></script>
</body>

</html>
